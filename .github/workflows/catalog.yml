name: Catalog validation

on:
  pull_request:
    paths:
      - "catalog.json"
      - "scripts/validate_catalog.py"
  push:
    branches: [main]
    paths:
      - "catalog.json"
      - "scripts/validate_catalog.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate catalog (schema + network checks)
        run: python3 scripts/validate_catalog.py --network
